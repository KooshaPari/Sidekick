name: cargo-audit

permissions: read-all

on:
  push:
    branches: [main]
    paths: ['Cargo.lock', 'Cargo.toml']
  pull_request:
    paths: ['Cargo.lock', 'Cargo.toml']
  schedule:
    - cron: '37 5 * * 3'  # weekly Wednesday
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.1
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
