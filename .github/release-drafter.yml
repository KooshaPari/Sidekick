name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
version-resolver:
  major:
    labels: ["breaking"]
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["bug", "fix", "dependencies", "ci", "chore", "docs"]
  default: patch
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
categories:
  - title: "Breaking Changes"
    labels: ["breaking"]
  - title: "Features"
    labels: ["feature", "enhancement"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Dependencies"
    labels: ["dependencies"]
  - title: "CI / Tooling"
    labels: ["ci", "chore"]
  - title: "Documentation"
    labels: ["docs"]
no-changes-template: "No notable changes."
exclude-labels: ["skip-changelog"]
