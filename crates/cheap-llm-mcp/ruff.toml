line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]
ignore = [
    "E501", # line length (formatter handles)
    "B008", # function call in default (we use respx fixtures)
]

[lint.per-file-ignores]
"tests/*" = ["B011", "SIM117"]

[format]
quote-style = "double"
