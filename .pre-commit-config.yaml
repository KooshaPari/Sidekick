repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: cargo-check

  # V20-04 (FLEET_DAG_v3.md §100.4): adopt pheno-vibecoding-guard locally
  - repo: local
    hooks:
      - id: pheno-vibecoding-guard
        name: pheno-vibecoding-guard
        entry: pheno-vibecoding-guard scan
        language: system
        pass_filenames: false
        stages: [pre-commit]
